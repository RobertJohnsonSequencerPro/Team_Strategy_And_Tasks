version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: team_strategy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: team_strategy_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── SQL Server (uncomment to use instead of Postgres) ───────────────────────
  # sqlserver:
  #   image: mcr.microsoft.com/mssql/server:2022-latest
  #   container_name: team_strategy_sqlserver
  #   restart: unless-stopped
  #   environment:
  #     SA_PASSWORD: "YourStrong@Passw0rd"
  #     ACCEPT_EULA: "Y"
  #     MSSQL_PID: Developer
  #   ports:
  #     - "1433:1433"
  #   volumes:
  #     - sqlserver_data:/var/opt/mssql
  # To use SQL Server, also set in appsettings.json:
  #   "Database": { "Provider": "SqlServer" }
  #   "ConnectionStrings": { "DefaultConnection": "Server=localhost,1433;Database=team_strategy_dev;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True" }

volumes:
  postgres_data:
  # sqlserver_data:
